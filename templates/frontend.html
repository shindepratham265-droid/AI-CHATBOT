<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chatbot</title>

<style>
/* ---------- GLOBAL ---------- */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0f0c29, #302b63, #24243e);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* ---------- CONTAINER ---------- */
.chat-container {
    width: 420px;
    height: 650px;
    backdrop-filter: blur(25px);
    background: rgba(20, 20, 40, 0.7);
    border-radius: 20px;
    box-shadow: 0 0 50px rgba(0,255,255,0.2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: fadeIn 0.6s ease;
}

/* ---------- HEADER ---------- */
.chat-header {
    padding: 20px;
    text-align: center;
    background: rgba(10, 10, 30, 0.9);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.chat-header h1 {
    margin: 0;
    font-size: 28px;
    letter-spacing: 2px;
    background: linear-gradient(90deg, #00f5ff, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* ---------- CHAT BOX ---------- */
.chat-box {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

/* ---------- MESSAGE ---------- */
.message {
    max-width: 75%;
    padding: 12px 15px;
    margin: 10px 0;
    border-radius: 14px;
    animation: slideUp 0.3s ease;
}

.user {
    background: linear-gradient(45deg, #3b82f6, #06b6d4);
    margin-left: auto;
}

.bot {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
}

/* ---------- INPUT ---------- */
.chat-input {
    display: flex;
    padding: 12px;
    background: rgba(10, 10, 30, 0.9);
}

.chat-input input {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    outline: none;
    background: #020617;
    color: white;
}

.chat-input button {
    margin-left: 10px;
    padding: 12px 18px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #00f5ff, #a855f7);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.chat-input button:hover {
    transform: scale(1.08);
}

/* ---------- TYPING ---------- */
.typing span {
    height: 6px;
    width: 6px;
    margin: 0 2px;
    background: #00f5ff;
    border-radius: 50%;
    display: inline-block;
    animation: bounce 1.2s infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

/* ---------- ANIMATIONS ---------- */
@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}

@keyframes slideUp {
    from { transform: translateY(10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

@keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="chat-container">
    <div class="chat-header">
        <h1>AI CHATBOT</h1>
    </div>

    <div class="chat-box" id="chatBox"></div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Ask something..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
// Automatically uses same host — works both locally and on PythonAnywhere
const API_URL = window.location.origin + "/chat";

async function sendMessage() {
    const input = document.getElementById("userInput");
    const chatBox = document.getElementById("chatBox");

    const message = input.value.trim();
    if (!message) return;

    chatBox.innerHTML += `<div class="message user">${message}</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;
    input.value = "";

    const typingDiv = document.createElement("div");
    typingDiv.className = "message bot";
    typingDiv.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    chatBox.appendChild(typingDiv);

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message })
        });

        const data = await response.json();
        chatBox.removeChild(typingDiv);

        const botMessage = data.reply || data.error || "No response received";
        chatBox.innerHTML += `<div class="message bot">${botMessage}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

    } catch {
        chatBox.removeChild(typingDiv);
        chatBox.innerHTML += `<div class="message bot">⚠️ Server error</div>`;
    }
}

document.getElementById("userInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
